name: Profile Summary Cards

on: 
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: action/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}                                                                                                            
          with:                                                                                                                                                  
            USERNAME: Seafood99                                                                                                                                  
            BRANCH_NAME: main                                                                                                                                    
            UTC_OFFSET: 7                                                                                                                                        
            AUTO_PUSH: true
